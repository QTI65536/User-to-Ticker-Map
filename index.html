let active = null;

function hl(id) {
  const allEdges = document.querySelectorAll('.edge');
  const allUsers = document.querySelectorAll('.u-node');
  const allTickers = document.querySelectorAll('.t-node');
  if (active === id) { active = null; reset(); closePane(); return; }
  active = id;
  const isUser = edges[id] !== undefined;
  const cu = new Set(); const ct = new Set();
  if (isUser) { cu.add(id); edges[id].forEach(t => ct.add(t)); }
  else { for (const [u,tickers] of Object.entries(edges)) { if (tickers.includes(id)) { cu.add(u); ct.add(id); } } }
  allEdges.forEach(e => {
    const p = e.id.split('-'); const u = p[1]; const t = p.slice(2).join('-');
    const m = cu.has(u) && ct.has(t);
    e.classList.toggle('dim', !m); e.classList.toggle('hi', m);
  });
  allUsers.forEach(n => n.classList.toggle('dim', !cu.has(n.id.replace('un-',''))));
  allTickers.forEach(n => n.classList.toggle('dim', !ct.has(n.id.replace('tn-',''))));
  showPane(id);
}

function showPane(id) {
  const d = S[id]; if (!d) return;
  document.getElementById('dp-badge').textContent = d.label;
  document.getElementById('dp-badge').style.cssText = `background:${d.bg};color:${d.color};font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;letter-spacing:.04em;text-transform:uppercase;display:inline-block;margin-bottom:4px`;
  document.getElementById('dp-title').textContent = d.title;
  document.getElementById('dp-body').innerHTML = d.body;
  document.getElementById('detail-pane').classList.add('visible');
}

function closePane() {
  document.getElementById('detail-pane').classList.remove('visible');
  reset(); active = null;
}

function reset() {
  document.querySelectorAll('.edge').forEach(e => e.classList.remove('dim','hi'));
  document.querySelectorAll('.u-node,.t-node').forEach(n => n.classList.remove('dim'));
}
</script>
