<p style="font-size:12px;color:var(--color-text-secondary);margin:4px 0 0;text-align:center">Click any user or ticker to highlight their connections · click again to reset</p>

<script>
const edges = {
  chowder: ['NVDA','MU','SMH','ASML','GLW','BST','AIO','NXG','QQI','BSTZ','DRAM','SPXC','ATO','NEE','GEV','XLB','JNJ','FAST','PEP','XLBI','DPG','VZ'],
  cemanuel: ['NVDA','ATO','NEE','SPCX'],
  seeks:    ['ATO','NEE','AEP','TIPS'],
  weather:  ['SPCX','MP','USAR'],
  jritz:    ['NBXG','BST','BSTZ'],
  max:      ['BST','BSTZ'],
  mac:      ['BST','BSTZ','COST','MA'],
  steve:    ['SPYI','CME'],
  qti:      ['VXUS'],
  indiv:    ['ATO'],
  mannie:   ['XLBI','XLSI'],
  myke:     ['KO'],
};

let active = null;

function highlight(id) {
  const allEdges = document.querySelectorAll('.edge');
  const allUsers = document.querySelectorAll('.u-node');
  const allTickers = document.querySelectorAll('.t-node');

  if (active === id) {
    active = null;
    allEdges.forEach(e => { e.classList.remove('dim','hi'); });
    allUsers.forEach(n => n.classList.remove('dim'));
    allTickers.forEach(n => n.classList.remove('dim'));
    return;
  }
  active = id;

  const isUser = edges[id] !== undefined;
  let connectedUsers = new Set();
  let connectedTickers = new Set();

  if (isUser) {
    connectedTickers = new Set(edges[id]);
    connectedUsers.add(id);
  } else {
    for (const [u, tickers] of Object.entries(edges)) {
      if (tickers.includes(id)) {
        connectedUsers.add(u);
        connectedTickers.add(id);
      }
    }
  }

  allEdges.forEach(e => {
    const eid = e.id;
    let matched = false;
    if (isUser) {
      matched = eid.startsWith('e-' + id + '-') && connectedTickers.has(eid.split('-').slice(2).join('-'));
    } else {
      for (const u of connectedUsers) {
        if (eid === 'e-' + u + '-' + id) { matched = true; break; }
      }
    }
    e.classList.toggle('dim', !matched);
    e.classList.toggle('hi', matched);
  });

  allUsers.forEach(n => {
    const uid = n.id.replace('un-', '');
    n.classList.toggle('dim', !connectedUsers.has(uid));
  });

  allTickers.forEach(n => {
    const tid = n.id.replace('tn-', '');
    n.classList.toggle('dim', !connectedTickers.has(tid));
  });
}
</script>
