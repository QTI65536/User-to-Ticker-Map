<p style="font-size:11px;color:var(--color-text-secondary);text-align:center;margin:2px 0 0">Click any user or ticker to highlight connections · click again to reset</p>

<script>
const edges = {
  chowder:  ['NVDA','MU','SMH','ASML','GLW','BST','AIO','NXG','QQI','BSTZ','DRAM','SPXC','ATO','NEE','GEV','JNJ','FAST','PEP','VZ','XLBI','XLB','DPG'],
  cemanuel: ['NVDA','ATO','NEE','SPCX'],
  seeks:    ['ATO','NEE','AEP','TIPS'],
  weather:  ['SPCX','MP','USAR'],
  jritz:    ['NBXG','BST','BSTZ'],
  max:      ['BST','BSTZ'],
  mac:      ['BST','BSTZ','COST','MA'],
  steve:    ['SPYI','CME'],
  qti:      ['VXUS'],
  indiv:    ['ATO'],
  mannie:   ['XLBI','XLSI'],
  myke:     ['KO'],
};

let active = null;

function hl(id) {
  const allEdges = document.querySelectorAll('.edge');
  const allUsers = document.querySelectorAll('.u-node');
  const allTickers = document.querySelectorAll('.t-node');
  if (active === id) {
    active = null;
    allEdges.forEach(e => e.classList.remove('dim','hi'));
    allUsers.forEach(n => n.classList.remove('dim'));
    allTickers.forEach(n => n.classList.remove('dim'));
    return;
  }
  active = id;
  const isUser = edges[id] !== undefined;
  const connectedUsers = new Set();
  const connectedTickers = new Set();
  if (isUser) {
    connectedUsers.add(id);
    edges[id].forEach(t => connectedTickers.add(t));
  } else {
    for (const [u, tickers] of Object.entries(edges)) {
      if (tickers.includes(id)) { connectedUsers.add(u); connectedTickers.add(id); }
    }
  }
  allEdges.forEach(e => {
    const parts = e.id.split('-');
    const u = parts[1]; const t = parts.slice(2).join('-');
    const matched = connectedUsers.has(u) && connectedTickers.has(t);
    e.classList.toggle('dim', !matched);
    e.classList.toggle('hi', matched);
  });
  allUsers.forEach(n => n.classList.toggle('dim', !connectedUsers.has(n.id.replace('un-',''))));
  allTickers.forEach(n => n.classList.toggle('dim', !connectedTickers.has(n.id.replace('tn-',''))));
}
</script>
